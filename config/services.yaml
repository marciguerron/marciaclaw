# ============================================
# BROWSER AUTOMATION
# ============================================
browser:
  headless: true
  timeout: 30000
  # Viewport por defecto
  viewport:
    width: 1280
    height: 720
  # Perfiles
  profile:
    default: ~/.cache/marciaclaw/browser
    user: ~/.config/google-chrome
  # Configuración de YouTube
  youtube:
    accept_cookies: true
    wait_for_shortstab: true
    scroll_pause: 1000
  # Headless mode para producción
  production:
    headless: true
    args:
      - "--no-sandbox"
      - "--disable-dev-shm-usage"
      - "--disable-gpu"

# ============================================
# GITHUB
# ============================================
github:
  token: ${GITHUB_TOKEN}
  owner: marciguerron
  repo: marciaclaw
  branch: main
  # Configuración de sync
  sync:
    auto_commit: false
    commit_prefix: "chore:"
    push_after_commit: true

# ============================================
# APLICACIÓN
# ============================================
app:
  name: MarciaClaw
  version: 1.0.0
  # Timezone por defecto
  timezone: UTC
  # Directorios
  directories:
    docs: docs
    config: config
    scripts: scripts
    integrations: integrations
    services: services
    memory: memory
    templates: templates
    utils: utils
  # Logging
  logging:
    level: info
    format: json
    file: logs/app.log
  # Features habilitadas
  features:
    tts: true
    voice_input: false
    auto_research: false
    heartbeat: true
    memory_persistence: true